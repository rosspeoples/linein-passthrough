# Optional WirePlumber integration for WirePlumber 0.5+.
# This loads the Lua helper that applies a clean node.nick to the loopback node.

wireplumber.components = [
  {
    name = "90-linein-passthrough.lua"
    type = script/lua
    provides = linein-passthrough-nick
  }
]

wireplumber.profiles = {
  main = {
    linein-passthrough-nick = required
  }
}
