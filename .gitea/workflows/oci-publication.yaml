name: OCI Publication

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish-oci-image:
    runs-on: desktop-linein-passthrough
    container:
      image: oci.thepeoples.dev/platform/agent-node:git-f592788@sha256:77de4343c54fc810679660ba4d419b71ec80b4e67eea764cbd3b2cca6b2ce9f7
      options: --user 0:0
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Publish OCI installer image
        env:
          OCI_REGISTRY: ${{ secrets.OCI_REGISTRY }}
          OCI_IMAGE: ${{ secrets.OCI_IMAGE }}
          REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
          OCI_TAG_ALIAS: ${{ secrets.OCI_TAG_ALIAS }}
          GITEA_SHA: ${{ gitea.sha }}
        run: bash scripts/publish-oci-image.sh
