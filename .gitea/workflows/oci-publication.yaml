name: OCI Publication

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish-oci-image:
    runs-on: desktop-linein-passthrough
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Publish OCI installer image
        env:
          OCI_REGISTRY: ${{ secrets.OCI_REGISTRY }}
          OCI_IMAGE: ${{ secrets.OCI_IMAGE }}
          REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
          OCI_TAG_ALIAS: ${{ secrets.OCI_TAG_ALIAS }}
          GITEA_SHA: ${{ gitea.sha }}
        run: bash scripts/publish-oci-image.sh
